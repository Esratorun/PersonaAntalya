{% extends "base.html" %}

{% block title %}Şifremi Unuttum - PersonaAntalya{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center align-items-center" style="min-height: 60vh;">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="bg-light rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                        <i class="bi bi-key-fill text-warning" style="font-size: 2.5rem;"></i>
                    </div>
                    <h3 class="fw-bold">Şifreni mi Unuttun?</h3>
                    <p class="text-muted">E-posta adresini gir, sana şifre sıfırlama bağlantısı gönderelim.</p>
                </div>

                <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                    <div class="form-floating mb-4">
                        <input type="email" class="form-control bg-light border-0" id="email" name="email" placeholder="name@example.com" required>
                        <label for="email" class="text-muted"><i class="bi bi-envelope me-2"></i>E-posta Adresi</label>
                    </div>

                    <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold text-white shadow-sm mb-3"
                            style="background: #f39c12; border: none;">
                        Bağlantı Gönder
                    </button>
                    
                    <div class="text-center mt-3">
                        <a href="{{ url_for('auth.login') }}" class="text-decoration-none small fw-bold text-muted">
                            <i class="bi bi-arrow-left me-1"></i> Giriş Sayfasına Dön
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
